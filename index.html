<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EVIL Discord</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<!-- LOGIN / REGISTER -->

<div class="login">

    <h1>EVIL Discord</h1>

    <input 
        id="username" 
        placeholder="Username"
    >

    <input 
        id="email" 
        placeholder="Email"
        type="email"
    >

    <input 
        id="password" 
        placeholder="Password"
        type="password"
    >


    <button id="register">
        Create Account
    </button>


    <button id="login">
        Login
    </button>

</div>




<!-- CHAT -->

<div class="chat" style="display:none;">


    <div class="header">

        <h2># general</h2>

        <button id="callButton">
            📞 Call
        </button>

</div>

<h3>VOICE CHANNELS</h3>

<div class="voice-channel" data-channel="general">
    🔊 General
</div>

<div class="voice-channel" data-channel="gaming">
    🔊 Gaming
</div>

<div class="voice-channel" data-channel="music">
    🔊 Music
</div>
    
<audio id="remoteAudio" autoplay></audio>


    <div id="messages">

    </div>



    <div class="input-area">

        <input 
            id="messageInput"
            placeholder="Message #general"
        >


        <button id="send">
            Send
        </button>

    </div>


</div>




<script type="module" src="script.js"></script>


</body>

</html>
