<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVIL Discord</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="servers">
    <div class="server">E</div>
    <div class="server">+</div>
</div>

<div class="channels">
    <h3>EVIL</h3>

    <div class="channel"># general</div>
    <div class="channel"># memes</div>
    <div class="channel"># gaming</div>
</div>

<div class="chat">

    <div class="header">
        # general
    </div>

    <div id="messages">
    </div>

    <div class="inputBar">
        <input id="messageInput" placeholder="Message #general">
        <button id="send">Send</button>
    </div>

</div>

<div class="members">
    <h3>Online</h3>

    <div>User1</div>
    <div>User2</div>
    <div>User3</div>

</div>

<script src="script.js"></script>

</body>
</html>
